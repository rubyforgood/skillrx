name: Reboot Proxy (Production)

# Stops and recreates the kamal-proxy container on the production host.
# Causes a brief proxy outage. Use when the running proxy is on an
# unparseable image tag (e.g. `latest`) and `kamal deploy` fails with
# "Malformed version number string ...".

on:
  workflow_dispatch:

jobs:
  reboot-proxy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
          bundler-cache: true

      - name: Install Kamal
        run: gem install kamal

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/skillrx_web_production.pem
          chmod 600 ~/.ssh/skillrx_web_production.pem

      - name: Reboot kamal-proxy on production
        env:
          KAMAL_REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          SECRET_KEY_BASE: ${{ secrets.PRODUCTION_SECRET_KEY_BASE }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.PRODUCTION_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PRODUCTION_AWS_SECRET_ACCESS_KEY }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.PRODUCTION_AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.PRODUCTION_AZURE_STORAGE_ACCOUNT_KEY }}
          SCOUT_KEY: ${{ secrets.PRODUCTION_SCOUT_KEY }}
          SCOUT_LOGS_INGEST_KEY: ${{ secrets.PRODUCTION_SCOUT_LOGS_INGEST_KEY }}
        run: |
          bin/kamal proxy reboot -d production --rolling -y
